; PlatformIO project configuration
;
; Build / upload / monitor:
;   cd platformio
;   pio run                  # compile
;   pio run -t upload        # flash
;   pio device monitor       # serial monitor (115200)
;
; src_dir is pointed at the shared Arduino sketch folder so the same code
; works for both Arduino IDE users and PlatformIO users.
;
; Reference: https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = ../IoT_Environmental_Sensor_Hub

[env:esp32dev]
platform           = espressif32
board              = esp32dev
framework          = arduino
monitor_speed      = 115200
upload_speed       = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit BMP280 Library@^2.6.8
    arduino-libraries/ArduinoMqttClient@^0.1.8
